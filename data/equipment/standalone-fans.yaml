equipment:
  - id: exhaust-fan
    name: Exhaust Fan
    abbreviation: EF
    category: standalone-fans
    description: Standalone fan used to exhaust air from a building or space. Commonly found in restrooms, kitchens, parking garages, and mechanical rooms. Not part of an air handling unit.
    haystack: exhaust fan equip
    brick: Exhaust_Fan
    aliases:
      common:
        - ef
        - exhaust-fan
        - toilet-exhaust
        - kitchen-exhaust
        - garage-exhaust
        - general-exhaust
    typical_points:
      - exhaust-fan-command
      - exhaust-fan-status
      - exhaust-fan-speed
      - exhaust-fan-alarm
      - equipment-run-hours

  - id: transfer-fan
    name: Transfer Fan
    abbreviation: TF
    category: standalone-fans
    description: Fan used to transfer air from one space to another within a building, typically from a positively pressurized space to a negatively pressurized space.
    haystack: transfer fan equip
    brick: Transfer_Fan
    aliases:
      common:
        - tf
        - transfer-air-fan
    typical_points:
      - exhaust-fan-command
      - exhaust-fan-status
      - equipment-run-hours
