concept:
  id: chilled-water-supply-temperature
  name: Chilled Water Supply Temperature
  category: temperatures
  description: Temperature of chilled water leaving the chiller plant
  haystack: chilled water leaving temp sensor
  brick: Chilled_Water_Supply_Temperature_Sensor
  unit: degF
  typical_range:
    min: 40
    max: 55
  object_type: analog-input
  engineering_units: degrees-fahrenheit

aliases:
  common:
    - chws-t
    - chws temp
    - chws temperature
    - chws tmp
    - chw supply temp
    - CHWST
    - CHW_Supply_Temp
  abbreviated:
    - chwst
    - cwst
  verbose:
