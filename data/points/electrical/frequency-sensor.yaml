concept:
  id: frequency-sensor
  name: AC Frequency
  category: electrical
  description: AC power system frequency in Hertz. Monitors grid stability and generator synchronization.
  haystack: elec freq sensor
  brick: Frequency_Sensor
  unit:
    - Hz
  point_function: sensor

aliases:
  common:
    - frequency
    - hz
    - line-frequency
    - grid-frequency
  misspellings:
    - frequncy

notes:
  - Standard is 60 Hz (North America) or 50 Hz (Europe/Asia)
  - Deviations from nominal indicate grid stress or generator issues
  - Critical for generator synchronization and UPS systems

related:
  - apparent-power-kva
  - electrical-current-sensor
  - electrical-demand-kw
  - energy-consumption-kwh
  - power-factor
  - reactive-power-kvar
  - voltage-sensor
