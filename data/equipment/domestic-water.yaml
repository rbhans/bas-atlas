equipment:
  - id: domestic-water-heater
    name: Domestic Water Heater
    abbreviation: WH
    category: domestic-water
    description: Equipment that heats domestic (potable) water for building use. May be electric, gas-fired, or use a heat exchanger fed by the building hot water loop.
    haystack: domestic hot water heater equip
    brick: Water_Heater
    subtypes:
      - electric-water-heater
      - gas-water-heater
      - heat-exchanger-water-heater
      - heat-pump-water-heater
    aliases:
      common:
        - water-heater
        - wh
        - dhw-heater
        - hot-water-heater
        - domestic-hw-heater
    typical_points:
      - domestic-hot-water-supply-temperature
      - domestic-hot-water-return-temperature

  - id: domestic-water-recirculation-pump
    name: Domestic Water Recirculation Pump
    abbreviation: DWRP
    category: domestic-water
    description: Pump that circulates domestic hot water through the building to maintain hot water availability at fixtures and prevent Legionella growth in stagnant piping.
    haystack: domestic hot water pump equip
    brick: Hot_Water_Pump
    aliases:
      common:
        - recirc-pump
        - dhw-pump
        - hot-water-recirc-pump
        - domestic-recirc-pump
    typical_points:
      - domestic-hot-water-supply-temperature
      - domestic-hot-water-return-temperature
      - equipment-run-hours
