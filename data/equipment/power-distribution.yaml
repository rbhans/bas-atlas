equipment:
  - id: generator
    name: Emergency Generator
    abbreviation: GEN
    category: power-distribution
    description: Standby or emergency power generator, typically diesel or natural gas fueled. Provides backup power during utility outages. Monitored by BAS for runtime, fuel level, and transfer status.
    haystack: generator equip
    brick: Generator
    aliases:
      common:
        - genset
        - standby-generator
        - emergency-generator
        - backup-generator
        - diesel-generator
    typical_points:
      - electrical-demand-kw
      - voltage-sensor
      - frequency-sensor
      - equipment-run-hours
      - equipment-start-count

  - id: uninterruptible-power-supply
    name: Uninterruptible Power Supply
    abbreviation: UPS
    category: power-distribution
    description: Battery-backed power supply that provides immediate backup power during utility outages. Protects critical loads like BAS controllers, servers, and life safety systems.
    haystack: ups equip
    brick: UPS
    aliases:
      common:
        - ups
        - battery-backup
        - uninterruptible-power
    typical_points:
      - electrical-demand-kw
      - voltage-sensor
      - electrical-current-sensor

  - id: automatic-transfer-switch
    name: Automatic Transfer Switch
    abbreviation: ATS
    category: power-distribution
    description: Switch that automatically transfers electrical load between normal (utility) and emergency (generator) power sources during an outage.
    haystack: ats equip
    brick: Automatic_Transfer_Switch
    aliases:
      common:
        - ats
        - transfer-switch
        - auto-transfer
    typical_points:
      - voltage-sensor
      - electrical-current-sensor
