concept:
  id: steam-flow
  name: Steam Flow
  category: flows
  description: Mass flow rate of steam, typically measured in pounds per hour (lbs/hr) or kilograms per hour. Used for steam system monitoring and energy accounting.
  haystack: steam flow sensor
  brick: Steam_Flow_Sensor
  unit:
    - lbs/hr
    - kg/hr
  point_function: sensor

aliases:
  common:
    - steam-flow-rate
    - steam-mass-flow
    - steam-lbs
  misspellings:
    - steem-flow

notes:
  - Often measured with vortex shedding, orifice plate, or differential pressure flow meters
  - Must compensate for steam pressure and temperature for accurate mass flow
  - Used for campus steam billing and boiler plant monitoring

related:
  - steam-heating-output
  - steam-valve-closed
  - steam-valve-open
