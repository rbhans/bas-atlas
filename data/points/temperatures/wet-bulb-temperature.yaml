concept:
  id: wet-bulb-temperature
  name: Wet Bulb Temperature
  category: temperatures
  description: Temperature measured by a thermometer with its bulb wrapped in wet cloth over which air is passed. Indicates the lowest temperature achievable by evaporative cooling and is critical for cooling tower performance evaluation.
  haystack: air wetBulb temp sensor
  brick: Wet_Bulb_Temperature_Sensor
  unit:
    - °F
    - °C
  point_function: sensor

aliases:
  common:
    - wet-bulb
    - wb-temp
    - wet-bulb-temp
    - owb
    - outdoor-wet-bulb
  misspellings:
    - wet-blub

notes:
  - Cooling tower approach = cold water temperature - wet bulb temperature
  - Used to evaluate cooling tower performance and sizing
  - Lower wet bulb temperatures allow towers to produce colder condenser water
  - Critical for free cooling / waterside economizer calculations

related:
