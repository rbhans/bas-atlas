concept:
  id: equipment-start-count
  name: Equipment Start Count
  category: maintenance
  description: Cumulative number of equipment start cycles. Excessive cycling reduces equipment life, especially for compressors and large motors.
  haystack: run starts sensor
  brick: Start_Stop_Count_Sensor
  unit:
    - count
  point_function: sensor

aliases:
  common:
    - start-count
    - cycle-count
    - starts
    - start-stop-count
    - num-starts
  misspellings:
    - start-cout

notes:
  - Motor starters and compressors have rated cycle limits
  - Compressor minimum off-time (typically 5 minutes) prevents short cycling
  - High start count relative to run hours indicates a control tuning problem

related:
  - equipment-run-hours
