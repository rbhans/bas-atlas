concept:
  id: equipment-run-hours
  name: Equipment Run Hours
  category: maintenance
  description: Cumulative operating hours for a piece of equipment. Used for preventive maintenance scheduling based on runtime thresholds.
  haystack: run duration sensor
  brick: Run_Hours_Sensor
  unit:
    - hours
  point_function: sensor

aliases:
  common:
    - run-hours
    - runtime-hours
    - operating-hours
    - total-run-hours
    - cumulative-hours
    - hrs-run
  misspellings:
    - runn-hours
    - run-hrs

notes:
  - Typically tracked per motor, compressor, or fan
  - Common maintenance thresholds include belt replacement (2000-4000 hrs), bearing lubrication (8000 hrs), and filter changes (based on differential pressure OR run hours)
  - Differs from run-time (existing entry) which may track current session

related:
  - equipment-start-count
  - run-time
