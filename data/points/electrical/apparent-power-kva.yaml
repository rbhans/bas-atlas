concept:
  id: apparent-power-kva
  name: Apparent Power
  category: electrical
  description: Total apparent power measured in kilovolt-amperes (kVA). Represents the combined real and reactive power.
  haystack: elec power apparent sensor
  brick: Apparent_Power_Sensor
  unit:
    - kVA
  point_function: sensor

aliases:
  common:
    - kva
    - apparent-power
    - total-power-kva
  misspellings:
    - aparent-power

notes:
  - Apparent power = sqrt(real power² + reactive power²)
  - Used for sizing transformers, generators, and UPS systems

related:
  - electrical-current-sensor
  - electrical-demand-kw
  - energy-consumption-kwh
  - frequency-sensor
  - power-factor
  - reactive-power-kvar
  - voltage-sensor
