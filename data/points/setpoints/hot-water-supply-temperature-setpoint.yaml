concept:
  id: hot-water-supply-temperature-setpoint
  name: Hot Water Supply Temperature Setpoint
  category: setpoints
  description: Target supply temperature for hot water leaving the boiler or hot water plant. Controls boiler firing and hot water system operation.
  haystack: hot water leaving temp sp
  brick: Hot_Water_Supply_Temperature_Setpoint
  unit:
    - °F
    - °C
  point_function: setpoint

aliases:
  common:
    - hws-sp
    - hw-supply-temp-sp
    - boiler-setpoint
    - hw-temp-setpoint
    - hot-water-setpoint
  misspellings:
    - hot-water-suply-temp-sp

notes:
  - Typical range is 140-180°F (60-82°C)
  - Lower setpoints reduce boiler losses and improve condensing boiler efficiency
  - Often reset based on outdoor air temperature (outdoor air reset schedule)

related:
  - hot-water-supply-temperature
  - hot-water-return-temperature
