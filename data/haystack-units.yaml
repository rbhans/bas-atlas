# Maps BAS Atlas unit symbols to Haystack 4 unit identifiers.
# Used by the build to include Haystack-normalized units in output.

version: "1.0"

units:
  # Temperature
  "°F":
    haystack: "°F"
    quantity: temperature
  "°C":
    haystack: "°C"
    quantity: temperature

  # Pressure
  "in. W.C.":
    haystack: "inH₂O"
    quantity: pressure
  "inWC":
    haystack: "inH₂O"
    quantity: pressure
  "ft H₂O":
    haystack: "ftH₂O"
    quantity: pressure
  "ft. H2O":
    haystack: "ftH₂O"
    quantity: pressure
  "PSI":
    haystack: "psi"
    quantity: pressure
  "Pa":
    haystack: "Pa"
    quantity: pressure
  "kPa":
    haystack: "kPa"
    quantity: pressure

  # Flow
  "CFM":
    haystack: "cfm"
    quantity: volumetric_flow
  "L/s":
    haystack: "L/s"
    quantity: volumetric_flow
  "GPM":
    haystack: "gal/min"
    quantity: volumetric_flow
  "lbs/hr":
    haystack: "lb/h"
    quantity: mass_flow
  "kg/hr":
    haystack: "kg/h"
    quantity: mass_flow

  # Humidity
  "%RH":
    haystack: "%RH"
    quantity: humidity
  "%":
    haystack: "%"
    quantity: dimensionless

  # Electrical
  "kW":
    haystack: "kW"
    quantity: power
  "kWh":
    haystack: "kWh"
    quantity: energy
  "kVA":
    haystack: "kVA"
    quantity: apparent_power
  "kVAR":
    haystack: "kVAR"
    quantity: reactive_power
  "V":
    haystack: "V"
    quantity: electric_potential
  "A":
    haystack: "A"
    quantity: electric_current
  "Hz":
    haystack: "Hz"
    quantity: frequency
  "PF":
    haystack: "PF"
    quantity: power_factor

  # Concentration
  "ppm":
    haystack: "ppm"
    quantity: concentration
  "ppb":
    haystack: "ppb"
    quantity: concentration
  "µg/m³":
    haystack: "µg/m³"
    quantity: concentration

  # Illuminance
  "lux":
    haystack: "lux"
    quantity: illuminance

  # Duration
  "hours":
    haystack: "hr"
    quantity: time
  "hr":
    haystack: "hr"
    quantity: time
  "h":
    haystack: "hr"
    quantity: time

  # Count
  "count":
    haystack: "count"
    quantity: dimensionless
