concept:
  id: duct-static-pressure-setpoint
  name: Duct Static Pressure Setpoint
  category: setpoints
  description: Target static pressure in the supply duct. Primary setpoint for supply fan speed control in VAV systems.
  haystack: discharge duct static pressure sp
  brick: Supply_Air_Static_Pressure_Setpoint
  unit:
    - inWC
    - Pa
  point_function: setpoint

aliases:
  common:
    - duct-sp-setpoint
    - static-pressure-sp
    - dsp-sp
    - supply-static-sp
    - duct-pressure-setpoint
  misspellings:
    - duct-stactic-pressure-sp

notes:
  - Typical initial setpoint is 1.0-2.0 inWC for medium-pressure ductwork
  - ASHRAE Guideline 36 recommends static pressure reset — lower setpoint when VAV boxes are satisfied, raise when boxes are starved
  - Static pressure reset can save 20-40% of fan energy

related:
  - discharge-air-pressure
  - discharge-air-pressure-setpoint
  - duct-static-pressure
  - supply-fan-speed
