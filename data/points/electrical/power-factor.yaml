concept:
  id: power-factor
  name: Power Factor
  category: electrical
  description: Ratio of real power to apparent power, ranging from 0.0 to 1.0. Indicates how effectively electrical power is being used.
  haystack: elec pf sensor
  brick: Power_Factor_Sensor
  unit:
    - PF
  point_function: sensor

aliases:
  common:
    - pf
    - pwr-factor
    - power-factor-ratio
  misspellings:
    - powerfactor

notes:
  - A power factor of 1.0 means all power is real (resistive loads)
  - Most utilities penalize power factor below 0.85-0.90
  - Can be improved with capacitor banks or VFDs

related:
  - electrical-demand-kw
  - reactive-power-kvar
  - apparent-power-kva
