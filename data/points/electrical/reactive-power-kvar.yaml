concept:
  id: reactive-power-kvar
  name: Reactive Power
  category: electrical
  description: Reactive power measured in kilovolt-amperes reactive (kVAR). Indicates inductive or capacitive load contribution.
  haystack: elec power reactive sensor
  brick: Reactive_Power_Sensor
  unit:
    - kVAR
  point_function: sensor

aliases:
  common:
    - kvar
    - reactive-power
    - vars
  misspellings:
    - kvar-power
    - reative-power

notes:
  - High reactive power reduces power factor and may incur utility penalties
  - Common sources include motors, transformers, and fluorescent lighting ballasts

related:
