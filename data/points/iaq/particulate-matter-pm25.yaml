concept:
  id: particulate-matter-pm25
  name: PM2.5 Particulate Matter
  category: iaq
  description: Fine particulate matter with diameter ≤2.5 microns, measured in micrograms per cubic meter. Critical for indoor air quality assessment, especially post-COVID building standards.
  haystack: air pm25 sensor
  brick: PM2.5_Sensor
  unit:
    - µg/m³
  point_function: sensor

aliases:
  common:
    - pm25
    - pm-2-5
    - fine-particulate
    - particulate-sensor
    - dust-sensor
  misspellings:
    - pm2.5-sensor
    - particulate-mater

notes:
  - EPA Air Quality Index (AQI) categories for PM2.5 range from 0 (good) to 500+ (hazardous)
  - Increasingly required in commercial buildings for IAQ monitoring
  - Used to control filtration levels and outdoor air intake during poor outdoor air quality events

related:
  - particulate-matter-pm10
  - volatile-organic-compounds
