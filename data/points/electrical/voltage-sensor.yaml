concept:
  id: voltage-sensor
  name: Voltage
  category: electrical
  description: AC voltage measurement, either line-to-neutral or line-to-line. Used for power quality monitoring and equipment protection.
  haystack: elec volt sensor
  brick: Voltage_Sensor
  unit:
    - V
  point_function: sensor

aliases:
  common:
    - voltage
    - volts
    - vac
    - line-voltage
    - supply-voltage
    - rms-voltage
  misspellings:
    - votlage

notes:
  - Typical values are 120V, 208V, 277V, 480V (in North America)
  - Voltage sags/swells can damage equipment and should trigger alarms
  - Often measured per phase (A, B, C) on three-phase systems

related:
  - electrical-current-sensor
  - electrical-demand-kw
  - frequency-sensor
