concept:
  id: building-pressure-setpoint
  name: Building Pressure Setpoint
  category: setpoints
  description: Target differential pressure between the building interior and outdoors. Positive pressure prevents unconditioned air infiltration.
  haystack: building air pressure sp
  brick: Building_Air_Static_Pressure_Setpoint
  unit:
    - inWC
    - Pa
  point_function: setpoint

aliases:
  common:
    - building-sp
    - bldg-pressure-sp
    - building-static-sp
    - building-pressurization-sp
  misspellings:
    - building-presure-setpoint

notes:
  - Typical setpoint is +0.03 to +0.10 inWC (positive relative to outdoors)
  - Controlled by modulating relief/exhaust air dampers or fans
  - Negative building pressure causes comfort complaints from cold drafts and door operation issues

related:
  - building-pressure
  - relief-air-damper-position
  - return-air-pressure-setpoint
  - space-pressure
