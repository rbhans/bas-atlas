concept:
  id: lighting-occupancy-sensor
  name: Lighting Occupancy Sensor
  category: lighting
  description: Presence detection sensor for lighting control. Detects whether a space is occupied to enable or disable lighting.
  haystack: occ sensor
  brick: Occupancy_Sensor
  point_function: status
  states:
    "0":
      - unoccupied
      - vacant
      - no-motion
    "1":
      - occupied
      - motion-detected
      - presence

aliases:
  common:
    - occupancy-sensor
    - motion-sensor
    - pir-sensor
    - presence-sensor
    - vacancy-sensor
  misspellings:
    - occupency-sensor
    - ocupancy-sensor

notes:
  - PIR (passive infrared), ultrasonic, and dual-technology types available
  - Vacancy sensors require manual ON, auto OFF — preferred by energy codes
  - Occupancy sensors auto ON, auto OFF
  - Timeout period is configurable (typically 15-30 minutes)

related:
  - lighting-level
  - lighting-dimming-output
  - occupancy
