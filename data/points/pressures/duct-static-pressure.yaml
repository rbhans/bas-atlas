concept:
  id: duct-static-pressure
  name: Duct Static Pressure
  category: pressures
  description: Static pressure measured in the supply air duct, typically 2/3 of the way down the longest duct run. Primary control input for supply fan speed in VAV systems.
  haystack: discharge duct static pressure sensor
  brick: Supply_Air_Static_Pressure_Sensor
  unit:
    - inWC
    - Pa
  point_function: sensor

aliases:
  common:
    - duct-pressure
    - static-pressure
    - supply-duct-pressure
    - duct-sp
    - dsp
    - supply-static
  misspellings:
    - duct-stactic-pressure

notes:
  - Typical setpoint for VAV systems is 1.0-2.0 inWC
  - ASHRAE Guideline 36 recommends static pressure reset based on VAV box damper positions
  - Sensor location at 2/3 point of the longest duct run is the industry standard
  - Low duct static with fan at full speed may indicate duct leakage or obstruction

related:
  - discharge-air-pressure
  - discharge-air-pressure-setpoint
  - duct-static-pressure-setpoint
  - supply-fan-output
  - supply-fan-speed
