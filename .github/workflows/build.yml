name: Validate DB

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'dist/bas-atlas.db'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate SQLite DB
        run: |
          test -f dist/bas-atlas.db
          sqlite3 dist/bas-atlas.db "SELECT 'points', COUNT(*) FROM points;"
          sqlite3 dist/bas-atlas.db "SELECT 'equipment', COUNT(*) FROM equipment;"
          sqlite3 dist/bas-atlas.db "SELECT 'models', COUNT(*) FROM models;"
          sqlite3 dist/bas-atlas.db "SELECT 'brands', COUNT(*) FROM brands;"
          sqlite3 dist/bas-atlas.db "SELECT 'fk_violations', COUNT(*) FROM (SELECT * FROM pragma_foreign_key_check);"
          echo "DB validation successful!"
