# Haystack 4 Tag Dictionary for BAS Babel
# Maps every tag token used in this database to its Haystack kind and semantic category.
# Used by the build to parse, validate, and enrich haystack strings.
#
# Categories:
#   entityType    - Entity classification (point, equip)
#   pointFunction - Point role (sensor, cmd, sp)
#   substance     - What is being measured/controlled (air, water, steam, elec, gas)
#   measurement   - Physical quantity (temp, pressure, flow, humidity, power, etc.)
#   qualifier     - Context modifier (zone, supply, return, chilled, hot, etc.)
#   equipType     - Equipment classification (fan, pump, valve, damper, ahu, vav, etc.)
#   state         - Point state descriptor (open, closed, run, fault, etc.)

version: "1.0"

tags:
