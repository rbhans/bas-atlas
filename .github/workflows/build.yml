name: Validate Build

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'data/**'
      - 'scripts/**'
      - 'package.json'
  pull_request:
    branches: [main]
    paths:
      - 'data/**'
      - 'scripts/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Validate output
        run: |
          # Check that all expected files exist
          test -f dist/index.json
          test -f dist/categories.json
          test -f dist/search-index.json

          # Validate JSON syntax
          node -e "JSON.parse(require('fs').readFileSync('dist/index.json'))"
          node -e "JSON.parse(require('fs').readFileSync('dist/categories.json'))"
          node -e "JSON.parse(require('fs').readFileSync('dist/search-index.json'))"

          echo "Build validation successful!"
