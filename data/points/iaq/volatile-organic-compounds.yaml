concept:
  id: volatile-organic-compounds
  name: Volatile Organic Compounds (VOC)
  category: iaq
  description: Total volatile organic compound concentration. VOCs include chemicals from paints, cleaning products, furnishings, and building materials that impact indoor air quality.
  haystack: air tvoc sensor
  brick: TVOC_Sensor
  unit:
    - ppb
    - µg/m³
  point_function: sensor

aliases:
  common:
    - voc
    - tvoc
    - voc-sensor
    - total-voc
    - volatile-organics
  misspellings:
    - volitile-organic

notes:
  - TVOC sensors measure a broad range of organic chemicals as a single reading
  - WELL Building Standard and RESET Air Standard both specify TVOC thresholds
  - Can trigger increased ventilation or filtration when levels are elevated

related:
  - zone-co2
  - particulate-matter-pm25
