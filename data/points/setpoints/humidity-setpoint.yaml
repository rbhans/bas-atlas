concept:
  id: humidity-setpoint
  name: Zone Humidity Setpoint
  category: setpoints
  description: Target relative humidity for a conditioned zone. Controls humidification and dehumidification equipment.
  haystack: zone air humidity sp
  brick: Zone_Air_Humidity_Setpoint
  unit:
    - "%RH"
  point_function: setpoint

aliases:
  common:
    - rh-setpoint
    - humidity-sp
    - relative-humidity-setpoint
    - zone-rh-sp
    - moisture-setpoint
  misspellings:
    - humidty-setpoint

notes:
  - Typical comfort range is 30-60% RH
  - Healthcare facilities often require tighter control (40-60% RH)
  - Data centers typically target 40-60% RH per ASHRAE TC 9.9
  - Some systems use separate high-limit and low-limit humidity setpoints

related:
  - dewpoint-temperature
  - humidifier-enable
  - humidifier-feedback
  - humidifier-output
  - return-air-humidity
  - zone-humidity
