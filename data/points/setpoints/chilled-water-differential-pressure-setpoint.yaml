concept:
  id: chilled-water-differential-pressure-setpoint
  name: Chilled Water Differential Pressure Setpoint
  category: setpoints
  description: Target differential pressure across the chilled water loop, used to control chilled water pump speed. Ensures adequate flow to all coils.
  haystack: chilled water differential pressure sp
  brick: Chilled_Water_Differential_Pressure_Setpoint
  unit:
    - PSI
    - ft H₂O
    - kPa
  point_function: setpoint

aliases:
  common:
    - chw-dp-sp
    - chw-diff-pressure-sp
    - chw-pump-sp
    - differential-pressure-sp
  misspellings:
    - chilled-water-diferential-pressure-sp

notes:
  - Controls variable speed pump operation to maintain adequate pressure across the most remote coil
  - ASHRAE Guideline 36 recommends differential pressure reset based on valve positions
  - Sensor should be located at the most hydraulically remote coil, not at the pump discharge
  - Typical range is 5-25 PSI depending on system size

related:
  - chilled-water-differential-pressure
  - chilled-water-flow
