equipment:
  - id: fire-alarm-control-panel
    name: Fire Alarm Control Panel
    abbreviation: FACP
    category: life-safety
    description: Central panel of the fire alarm system. The BAS monitors the FACP for general alarm, trouble, and supervisory conditions to execute smoke control and HVAC shutdown sequences.
    haystack: fire alarm panel equip
    brick: Fire_Alarm_Control_Panel
    aliases:
      common:
        - facp
        - fire-panel
        - fire-alarm-panel
        - fa-panel
    typical_points:
      - fire-alarm-status
      - smoke-alarm
      - communication-loss-alarm

  - id: smoke-detector
    name: Smoke Detector
    abbreviation: SD
    category: life-safety
    description: Device that detects smoke and reports to the fire alarm control panel. Duct-mounted smoke detectors are monitored by the BAS to shut down associated air handling units.
    haystack: smoke detector equip
    brick: Smoke_Detector
    subtypes:
      - photoelectric-smoke-detector
      - ionization-smoke-detector
      - duct-smoke-detector
    aliases:
      common:
        - sd
        - smoke-detector
        - duct-smoke-detector
        - area-smoke-detector
    typical_points:
      - smoke-alarm
