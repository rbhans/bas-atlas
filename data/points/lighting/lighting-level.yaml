concept:
  id: lighting-level
  name: Lighting Level
  category: lighting
  description: Measured or commanded light intensity level, typically as a percentage (0-100%) of full output. Used for dimming control and daylight harvesting.
  haystack: light level sensor
  brick: Luminance_Sensor
  unit:
    - "%"
  point_function: sensor

aliases:
  common:
    - light-level
    - illumination-level
    - dimming-level
    - brightness
    - lux-level
    - lighting-output
  misspellings:
    - ligting-level

notes:
  - 0% = off, 100% = full brightness
  - Some systems report in lux (absolute illumination) rather than percentage
  - Daylight harvesting systems modulate lighting level based on natural light availability

related:
  - lighting-dimming-output
  - daylight-illuminance
  - lighting-occupancy-sensor
