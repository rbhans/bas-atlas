concept:
  id: chilled-water-supply-temperature-setpoint
  name: Chilled Water Supply Temperature Setpoint
  category: setpoints
  description: Target supply temperature for chilled water leaving the chiller or chilled water plant. Fundamental to chiller control and energy optimization.
  haystack: chilled water leaving temp sp
  brick: Chilled_Water_Supply_Temperature_Setpoint
  unit:
    - °F
    - °C
  point_function: setpoint

aliases:
  common:
    - chws-sp
    - chw-supply-temp-sp
    - chiller-setpoint
    - chw-temp-setpoint
    - chilled-water-setpoint
  misspellings:
    - chilled-water-suply-temp-sp

notes:
  - Typical range is 40-48°F (4-9°C)
  - Higher setpoints improve chiller efficiency (approximately 1-2% per degree F)
  - ASHRAE Guideline 36 recommends CHW supply temperature reset based on valve positions or outdoor air temperature

related:
  - chilled-water-supply-temperature
  - chilled-water-return-temperature
