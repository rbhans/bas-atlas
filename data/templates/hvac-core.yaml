templates:
  - id: ahu-v1
    equipmentTypeId: air-handling-unit
    version: 1.0.0
    requiredPoints:
      - supply-fan-command
      - supply-fan-status
      - supply-air-temperature
      - return-air-temperature
      - outside-air-damper-output
      - cooling-valve-output
      - heating-valve-output
    optionalPoints:
      - mixed-air-temperature
      - filter-alarm
      - smoke-alarm
      - low-limit-alarm
      - supply-fan-speed
    recommendedPoints:
      - discharge-air-temperature
      - outdoor-air-temperature
      - return-fan-status
    relationships:
      - from: supply-fan-command
        rel: commands
        to: supply-fan-status
      - from: outside-air-damper-output
        rel: controls
        to: mixed-air-temperature
      - from: cooling-valve-output
        rel: controls
        to: discharge-air-temperature
      - from: heating-valve-output
        rel: controls
        to: discharge-air-temperature
    notes:
      - Assumes a draw-through AHU sequence with mixed air control and coil modulation.

  - id: rtu-v1
    equipmentTypeId: rooftop-unit
    version: 1.0.0
    requiredPoints:
      - supply-fan-command
      - supply-fan-status
      - discharge-air-temperature
      - outdoor-air-temperature
      - outside-air-damper-output
      - dx-cooling-stage
      - gas-fired-heat-output
    optionalPoints:
      - mixed-air-temperature
      - filter-alarm
      - smoke-alarm
      - economizer-enable
    recommendedPoints:
      - supply-fan-speed
      - return-air-temperature
      - supply-air-flow
    relationships:
      - from: supply-fan-command
        rel: commands
        to: supply-fan-status
      - from: dx-cooling-stage
        rel: controls
        to: discharge-air-temperature
      - from: gas-fired-heat-output
        rel: controls
        to: discharge-air-temperature
      - from: outside-air-damper-output
        rel: controls
        to: mixed-air-temperature
    notes:
      - Assumes packaged DX cooling with staged compressor control and gas heat output.

  - id: vav-v1
    equipmentTypeId: variable-air-volume-box
    version: 1.0.0
    requiredPoints:
      - zone-temperature
      - zone-temperature-setpoint
      - discharge-air-flow
      - occupied-cooling-setpoint
      - occupied-heating-setpoint
    optionalPoints:
      - heating-valve-output
      - supply-air-temperature
      - zone-humidity
      - discharge-air-temperature
    recommendedPoints:
      - duct-static-pressure
      - occupied-command
      - minimum-outdoor-airflow-setpoint
    relationships:
      - from: zone-temperature
        rel: depends_on
        to: zone-temperature-setpoint
      - from: heating-valve-output
        rel: controls
        to: discharge-air-temperature
      - from: discharge-air-flow
        rel: feeds
        to: zone-temperature
    notes:
      - Assumes pressure-independent VAV logic. Some projects replace occupied setpoints with effective setpoints.

  - id: chiller-v1
    equipmentTypeId: chiller
    version: 1.0.0
    requiredPoints:
      - chiller-command
      - chiller-status
      - chilled-water-supply-temperature
      - chilled-water-return-temperature
      - condenser-water-supply-temperature
      - condenser-water-return-temperature
    optionalPoints:
      - chiller-alarm
      - chiller-enable
      - chilled-water-flow
      - condenser-water-flow
    recommendedPoints:
      - chilled-water-pump-status
      - condenser-water-pump-status
      - chilled-water-differential-pressure
    relationships:
      - from: chiller-command
        rel: commands
        to: chiller-status
      - from: chilled-water-return-temperature
        rel: feeds
        to: chilled-water-supply-temperature
      - from: condenser-water-return-temperature
        rel: feeds
        to: condenser-water-supply-temperature
    notes:
      - Assumes closed-loop chilled water with condenser water heat rejection.

  - id: boiler-v1
    equipmentTypeId: boiler
    version: 1.0.0
    requiredPoints:
      - boiler-command
      - boiler-status
      - hot-water-supply-temperature
      - hot-water-return-temperature
    optionalPoints:
      - boiler-alarm
      - boiler-output
      - hot-water-pump-status
      - hot-water-flow
    recommendedPoints:
      - heating-enable
      - hot-water-differential-pressure
      - hot-water-supply-temperature-setpoint
    relationships:
      - from: boiler-command
        rel: commands
        to: boiler-status
      - from: boiler-output
        rel: controls
        to: hot-water-supply-temperature
      - from: hot-water-return-temperature
        rel: feeds
        to: hot-water-supply-temperature
    notes:
      - Assumes variable firing control with primary loop temperature reset.

  - id: cooling-tower-v1
    equipmentTypeId: cooling-tower
    version: 1.0.0
    requiredPoints:
      - cooling-tower-command
      - cooling-tower-status
      - condenser-water-supply-temperature
      - condenser-water-return-temperature
    optionalPoints:
      - cooling-tower-alarm
      - cooling-tower-output
      - cooling-tower-basin-temperature
      - condenser-water-flow
    recommendedPoints:
      - condenser-water-pump-status
      - condenser-water-pump-command
      - condenser-water-pump-output
    relationships:
      - from: cooling-tower-command
        rel: commands
        to: cooling-tower-status
      - from: cooling-tower-output
        rel: controls
        to: condenser-water-supply-temperature
      - from: condenser-water-return-temperature
        rel: feeds
        to: condenser-water-supply-temperature
    notes:
      - Assumes condenser water loop with staged or modulating fan control.

  - id: pump-v1
    equipmentTypeId: pump
    version: 1.0.0
    requiredPoints:
      - chilled-water-pump-command
      - chilled-water-pump-status
    optionalPoints:
      - chilled-water-pump-alarm
      - chilled-water-flow
      - chilled-water-differential-pressure
      - chilled-water-pump-output
    recommendedPoints:
      - primary-chilled-water-pump-status
      - primary-chilled-water-pump-command
      - primary-chilled-water-pump-output
    relationships:
      - from: chilled-water-pump-command
        rel: commands
        to: chilled-water-pump-status
      - from: chilled-water-pump-output
        rel: controls
        to: chilled-water-flow
      - from: chilled-water-flow
        rel: feeds
        to: chilled-water-differential-pressure
    notes:
      - Represents a generic hydronic pump control template.

  - id: fan-coil-unit-v1
    equipmentTypeId: fan-coil-unit
    version: 1.0.0
    requiredPoints:
      - supply-fan-command
      - supply-fan-status
      - zone-temperature
      - zone-temperature-setpoint
      - cooling-valve-output
      - heating-valve-output
    optionalPoints:
      - zone-humidity
      - supply-air-temperature
      - filter-alarm
      - occupied-command
    recommendedPoints:
      - occupied-cooling-setpoint
      - occupied-heating-setpoint
      - supply-fan-speed
    relationships:
      - from: supply-fan-command
        rel: commands
        to: supply-fan-status
      - from: cooling-valve-output
        rel: controls
        to: zone-temperature
      - from: heating-valve-output
        rel: controls
        to: zone-temperature
    notes:
      - Assumes 2-pipe or 4-pipe fan coil with local zone loop control.
