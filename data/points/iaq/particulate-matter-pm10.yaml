concept:
  id: particulate-matter-pm10
  name: PM10 Particulate Matter
  category: iaq
  description: Particulate matter with diameter ≤10 microns, measured in micrograms per cubic meter. Includes dust, pollen, and mold spores.
  haystack: air pm10 sensor
  brick: PM10_Sensor
  unit:
    - µg/m³
  point_function: sensor

aliases:
  common:
    - pm10
    - pm-10
    - coarse-particulate
  misspellings:
    - pm-ten

notes:
  - Coarser than PM2.5, includes dust, pollen, and mold spores
  - Less commonly monitored than PM2.5 in commercial HVAC, but relevant for industrial and healthcare facilities

related:
  - particulate-matter-pm25
  - volatile-organic-compounds
